<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeFi Yield & IL Calculator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: #38bdf8; font-size: 24px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
        input { width: 100%; padding: 10px; background: #334155; border: 1px solid #475569; border-radius: 6px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0284c7; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0369a1; }
        .result { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; display: none; }
        .metric { margin-bottom: 10px; font-size: 16px; }
        .highlight { color: #34d399; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>DeFi Liquidity Pool Calculator</h1>
    <p style="color: #94a3b8; font-size: 13px; text-align: center;">Simulate returns and estimate Impermanent Loss (IL)</p>
    
    <div class="input-group">
        <label>Initial Capital (USDC/USD)</label>
        <input type="number" id="capital" value="1000">
    </div>
    <div class="input-group">
        <label>Pool Estimated APR (%)</label>
        <input type="number" id="apr" value="50">
    </div>
    <div class="input-group">
        <label>Asset Price Change Multiplier (e.g., 2 if token doubles, 0.5 if it drops by half)</label>
        <input type="number" id="priceChange" value="1.5" step="0.1">
    </div>
    <div class="input-group">
        <label>Days Staked</label>
        <input type="number" id="days" value="30">
    </div>

    <button onclick="calculateDeFi()">Calculate Performance</button>

    <div class="result" id="resultBlock">
        <div class="metric">Estimated Yield Earnings: <span class="highlight" id="yieldEarned">$0.00</span></div>
        <div class="metric">Impermanent Loss (IL): <span style="color: #f87171; font-weight: bold;" id="ilValue">0.00%</span></div>
        <div class="metric">Net Projected Balance: <span class="highlight" id="netBalance">$0.00</span></div>
    </div>
</div>

<script>
function calculateDeFi() {
    const capital = parseFloat(document.getElementById('capital').value);
    const apr = parseFloat(document.getElementById('apr').value) / 100;
    const priceChange = parseFloat(document.getElementById('priceChange').value);
    const days = parseFloat(document.getElementById('days').value);

    // 1. Calculate Yield
    const dailyRate = apr / 365;
    const yieldEarned = capital * dailyRate * days;

    // 2. Calculate Impermanent Loss formula: 2*sqrt(k) / (1+k) - 1
    const k = priceChange;
    const il = (2 * Math.sqrt(k) / (1 + k)) - 1;
    const ilPercentage = Math.abs(il * 100);

    // 3. Calculate Final Net Return
    const lossFromIL = capital * Math.abs(il);
    const netBalance = (capital + yieldEarned) - lossFromIL;

    // Display Results
    document.getElementById('yieldEarned').innerText = '$' + yieldEarned.toFixed(2);
    document.getElementById('ilValue').innerText = ilPercentage.toFixed(2) + '%';
    document.getElementById('netBalance').innerText = '$' + netBalance.toFixed(2);
    document.getElementById('resultBlock').style.display = 'block';
}
</script>

</body>
</html>
